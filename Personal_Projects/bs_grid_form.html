<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout form</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="bs_grid_form_style.css">
</head>

<body>
    <div class="container">

        <!-- header -->
        <div class="row">
            <div class="col-12 text-center">
                <div class="header">
                    <img src="Images/bootstrap.png" alt="bootstrap_logo" style="width: 90px; height: 90px;">
                    <h2>Checkout form</h2>
                    <p>Below is an example form built entirely with Bootstra's form controls. Each required form group
                        has a validation <br> state that can be triggered by attempting to submit the form without
                        completing it.</p>
                </div>
            </div>
        </div>

        <div class="row">
            <div class="col-7 border">
                <h3>Billing address</h3>

                <!-- First name & Last name -->
                <div class="row">
                    <div class="col-6 border">
                        <label class="form-label">First name</label>
                        <input type="first name" class="form-control">
                    </div>
                    <div class="col-6 border">
                        <label class="form-label">Second name</label>
                        <input type="second name" class="form-control">
                    </div>

                    <!-- User name -->

                    <div class="row">
                        <div class="col-12">
                            <label class="form-label">Username</label>
                             <span class="input-group-text" id="basic-addon1">@</span>
  <input type="text" class="form-control" placeholder="Username" aria-label="Username" aria-describedby="basic-addon1">
                        </div>

                    </div>
                    <div class="col-12">
                        <div class="mb-3">
                            <label class="form-label">Email (Optional)</label>
                            <input type="email" class="form-control" placeholder="you@example.com">
                        </div>
                    </div>
                </div>
            </div>

        </div>

    </div>
    </div>
</body>

</html>
